  const persistNow = ()=>{
    if(SRV.on){ srvFlushSoon(); return; }    // server mode: the directory is the store
    const assets={}; doc.assets.forEach((b,p)=> assets[p]=b);
    idbPut("current", { v:1, source:state.source, filename:state.filename,
      themeId:state.themeId, assets });
  };
  const persistSoon = ()=>{
    clearTimeout(persistTimer);
    persistTimer=setTimeout(persistNow, 800);
  };

  const theme=()=>THEMES[state.themeId] || THEMES.midnight;
  // Install the active theme's stylesheet, only when it actually changed.
  // Document paths in url(...) are rewritten to blob: URLs on the way in;
  // the rewritten text is what's compared, so an asset swap re-installs.
  let appliedThemeCss=null;
  const applyTheme=()=>{
    const css=rewriteCssUrls(theme().css, RESOLVE_SRC);
    if(css!==appliedThemeCss){ appliedThemeCss=css; applyThemeCss(document, css); }
  };
  const slidesOf=()=>state.deck.slides;
  const curSlide=()=>slidesOf()[Math.max(0,Math.min(state.index, slidesOf().length-1))];

  /* ---- parse the manuscript into the deck model ---- */
  const reparse=()=>{
    try{
      state.deck = parseDeck(state.source);
      if(THEMES[state.deck.meta.theme]) state.themeId = state.deck.meta.theme;
      const w = state.deck.warnings || [];
      $("errBox").classList.toggle("warn", true);
      $("errBox").style.display = w.length ? "block" : "none";
      $("errBox").textContent = w.join("\n");
    }catch(err){
      $("errBox").classList.remove("warn");
      $("errBox").style.display="block";
      $("errBox").textContent = "Parse error: " + err.message;
      if(!state.deck) state.deck = parseDeck("");
    }
  };

  /* ---- which slide is the caret sitting in? ---- */
  const indexAtCaret=()=>{
    const pos = $("src").selectionStart;
    const ss = slidesOf();
    for(let i=0;i<ss.length;i++){ if(pos >= ss[i].start && pos <= ss[i].end) return i; }
    return Math.min(state.index, ss.length-1);
  };

  /* ---- measuring the bed ---- */
  const measure=()=>{
    const wrap=document.querySelector(".stagewrap");
    const availW=wrap.clientWidth-72, availH=wrap.clientHeight-56;
    return Math.max(240, Math.min(availW, availH*REF_W/REF_H));
  }

  /* ---- highlight active slide in the manuscript textarea ---- */
  // The per-line advance must be MEASURED, not computed — engines quantize
  // the used line height, so a hardcoded 13.5 × 1.65 drifts down the document.
  // Crucially, it must be measured on a real TEXTAREA: a styled div probe is
  // not guaranteed to reproduce the textarea's inner line layout exactly, and
  // being off by even 1/100px per line is visible a few hundred lines down.
  // So: an offscreen textarea with the same .src class, and the advance taken
  // as a scrollHeight DIFFERENCE between two line counts — paddings and any
  // constant first-line overhead cancel, and averaging over ~4k lines shrinks
  // scrollHeight's integer rounding to ≲1px across even very long documents.
  let LINE_H = 0;
  const measureLineH = () => {
    const probe = document.createElement("textarea");
    probe.className = "src";
    probe.style.cssText = "position:absolute; left:-9999px; top:0;"
      + "width:600px; height:50px; visibility:hidden;";
    document.body.appendChild(probe);
    probe.value = "x";
    const h1 = probe.scrollHeight;
    const N = 4096;
    probe.value = "x\n".repeat(N) + "x";   // N additional line boxes
    const h2 = probe.scrollHeight;
    probe.remove();
    const h = (h2 - h1) / N;
    LINE_H = h > 1 ? h : 13.5 * 1.65;      // sane fallback, never 0/NaN
    return LINE_H;
  };
  // browser zoom can change the quantization — re-measure on resize
  window.addEventListener("resize", () => { LINE_H = 0; });
  const lineH = () => LINE_H || measureLineH();
  const PAD_TOP = 14;
  const highlightSrc = () => {
    const s = curSlide();
    const src = state.source;
    const h = lineH();
    const startLine = src.slice(0, s.start).split("\n").length - 1;
    const endLine   = src.slice(0, s.end  ).split("\n").length - 1;
    // keep subpixel precision — gradients accept fractional px, and rounding
    // here would just reintroduce a (smaller) version of the same bug
    const top    = PAD_TOP + startLine * h;
    const bottom = PAD_TOP + (endLine + 1) * h;
    const totalH = ta.scrollHeight || 1;
    ta.style.backgroundImage = [
      `linear-gradient(to bottom,`,
      `  transparent ${top}px,`,
      `  rgba(255,255,255,.06) ${top}px,`,
      `  rgba(255,255,255,.06) ${bottom}px,`,
      `  transparent ${bottom}px`,
      `)`,
    ].join(" ");
    ta.style.backgroundSize = `100% ${totalH}px`;
    ta.style.backgroundAttachment = "local";
    ta.style.backgroundColor = "transparent";
  };

  /* ---- render: preview + rail + notes ---- */
  let cw=0;
  const showOnCanvas = makeTransitioner($("canvas"));
  // animate defaults to false: only real navigation (setIndex) passes true.
  const renderPreview=(animate, dir)=>{
    applyTheme();
    $("deckTitle").textContent=state.deck.meta.title;
    $("themeBtn").textContent="Theme: "+theme().name;
    cw=measure();
    const newSlide = renderSlide(curSlide(), cw);
    showOnCanvas(newSlide, curSlide().transition, dir||1, animate === true);
    $("badgeDim").textContent=REF_W+" × "+REF_H+" · "+state.deck.meta.aspect;
    $("badgeCount").textContent=pad2(state.index+1)+" / "+pad2(slidesOf().length);
    $("notesText").textContent=curSlide().notes || "No notes on this slide.";
    $("caretWhere").textContent="SLIDE "+pad2(state.index+1)+" / "+pad2(slidesOf().length);
  };
  const renderRail=()=>{
    const rail=$("rail"); rail.innerHTML="";
    // Compute thumbnail width from the rail's actual size minus padding, num label, gaps
    const miniW=Math.max(80, rail.clientWidth - 10*2 - 16 - 10*2 - 8*2 - 2);
    slidesOf().forEach((s,i)=>{
      const b=document.createElement("button");
      b.className="thumb"+(i===state.index?" active":"");
      const num=document.createElement("span"); num.className="num"; num.textContent=pad2(i+1);
      const mini=document.createElement("div"); mini.className="mini";
      mini.appendChild(renderSlide(s, miniW, {still:true}));
      b.append(num, mini);
      b.addEventListener("click", ()=>jumpToSlide(i));
      rail.appendChild(b);
    });
    const active = rail.querySelector(".thumb.active");
    if(active) active.scrollIntoView({ block:"nearest" });
  };
  const updateRailActive=()=>{
    const rail=$("rail");
    const thumbs=rail.querySelectorAll(".thumb");
    thumbs.forEach((b,i)=>{
      if(i===state.index){ b.classList.add("active"); b.querySelector(".num").style.color=""; }
      else { b.classList.remove("active"); b.querySelector(".num").style.color=""; }
    });
    const active=rail.querySelector(".thumb.active");
    if(active) active.scrollIntoView({ block:"nearest" });
  };
  const renderEditor=(animate, dir)=>{ renderPreview(animate, dir); renderRail(); highlightSrc(); };

  /* ---- caret -> slide, and rail click -> caret ---- */
  const syncFromCaret=()=>{
    const i=indexAtCaret();
    if(i!==state.index){
      state.index=i; renderPreview(false); updateRailActive(); highlightSrc();
      pushState(); // audience always tracks the primary view's slide
    }
  };
  const jumpToSlide=(i)=>{
    state.index=i;
    const ta=$("src"), s=slidesOf()[i];
    // place caret just inside the slide body, skipping leading directive lines
    let pos=s.start;
    const slice=state.source.slice(s.start, s.end);
    const m=slice.match(/[^\n]*[^\s][^\n]*/); // first non-blank line
    if(m) pos = s.start + slice.indexOf(m[0]);
    ta.focus(); ta.setSelectionRange(pos,pos);
    // nudge the line into view
    const before=state.source.slice(0,pos).split("\n").length;
    ta.scrollTop = Math.max(0,(before-3) * lineH());
    renderPreview(false); updateRailActive(); highlightSrc();
    pushState(); // audience always tracks the primary view's slide
  };

  /* ---- textarea wiring ---- */
  const ta=$("src");

  /* ---- bootstrap: persisted document > deckwright_intro.md > NEW_DECK ---- */
  const initWithSource=(src)=>{
    state.source = src;
    ta.value = state.source;
    reparse(); state.index = 0;
    ta.setSelectionRange(0, 0);
    renderEditor();
  };
  /** Register every root-level .css asset carrying a @theme header; themes
   *  are part of the document, so they travel through storage and .ddz.
   *  Returns any problems as messages (never throws). */
  const registerDocThemes = async ()=>{
    const problems=[];
    for(const [p, blob] of doc.assets){
      if(p.includes("/") || !/\.css$/i.test(p)) continue;
      try{
        const t = registerTheme(await blob.text());
        t.path = p;      // so deleting the asset can unregister the theme
      }catch(err){ problems.push(p+": "+err.message); }
    }
    return problems;
  };

  /* =========================================================================
   * DOCUMENT SERVER MODE — deckserver.py serving the document directory.
   *
   * Same document model, different store: at boot the served tree is pulled
   * into memory, and afterwards the in-memory document keeps flushing back
   * out — the directory replaces IndexedDB, nothing about editing changes.
   * Flushes are diffs, not dumps: Blobs are immutable, so identity against
   * the last-flushed snapshot (SRV.synced) says exactly which assets moved,
   * and unchanged files on disk are never touched (their mtimes are the
   * external-edit signal, and other tools may be watching the directory).
   *
   * Editing may also happen ON DISK, sequentially, not collaboratively: a
   * manifest poll compares per-file mtimes against those our own writes
   * produced; purely-external changes reload silently, and only a file
   * changed on BOTH sides in one window asks the user which version wins.
   *
   * Detection is a probe of the manifest endpoint: 200 = server mode (the
   * app then never touches IndexedDB), 401 = server there but the token is
   * missing (say so, fall back), anything else = ordinary standalone life.
   * ======================================================================= */
  const SRV = {
    on:false,
    token:new URLSearchParams(location.search).get("token") || "",
    name:null,               // manuscript filename on the server
    label:"",                // directory name, for the badge
    mtimes:new Map(),        // path -> mtime as last seen or produced by US
    synced:{ source:null, name:null, assets:new Map() },   // last flushed
    q:Promise.resolve(),     // one lane: flushes and polls never overlap
    badge:null, offline:false, problemShown:false, manifest0:null,
  };
  const encPath = p => p.split("/").map(encodeURIComponent).join("/");
  const srvApi = (p,opts={}) => fetch("/@deckwright/api/"+p, { ...opts,
    cache:"no-store",
    headers:{ ...(opts.headers||{}), "X-Deckwright-Token":SRV.token } });
  const srvBadge=(txt,bad)=>{
    if(!SRV.badge) return;
    SRV.badge.textContent = txt;
    SRV.badge.style.color = bad ? "#e08080" : "var(--muted)";
  };
  const srvIsDocTheme = p => !p.includes("/") && /\.css$/i.test(p);
  // The manuscript name the server should have: state.filename when it is a
  // plausible root-level .md (so "Save as" renames on the server too).
  const srvMdName = () =>
    (state.filename && /\.(md|markdown)$/i.test(state.filename)
      && !state.filename.includes("/")) ? state.filename : SRV.name;

  const srvProbe = async ()=>{
    let r;
    try{ r = await srvApi("manifest"); }catch(e){ return false; }
    if(r.status===401){
      alert("A Deckwright document server is running at this address, but "
        + "this page has no valid access token.\n\nOpen the exact URL that "
        + "deckserver printed at startup.\n\nFalling back to browser storage.");
      return false;
    }
    if(!r.ok) return false;
    try{ SRV.manifest0 = await r.json(); }catch(e){ return false; }
    return SRV.manifest0 && SRV.manifest0.v===1;
  };

  const srvBoot = async ()=>{
    SRV.on = true;
    const m = SRV.manifest0; SRV.manifest0 = null;
    SRV.name = m.manuscript || "deck.md";
    SRV.label = m.root || "document";
    doc.assets.clear();
    let source = null;
    for(const f of m.files){
      SRV.mtimes.set(f.path, f.mtime);
      const r = await srvApi("file/"+encPath(f.path));
      if(!r.ok) continue;                       // vanished mid-boot: the poll will see
      if(f.path === SRV.name) source = await r.text();
      else doc.assets.set(f.path, await r.blob());
    }
    await registerDocThemes();
    appliedThemeCss = null;
    initWithSource(source===null ? NEW_DECK : source);   // empty dir: fresh deck
    state.filename = SRV.name;
    SRV.synced = { source, name:(source===null ? null : SRV.name),
                   assets:new Map(doc.assets) };
    renderAssets();
    const el=document.createElement("span");
    el.className="mono";
    el.style.cssText="font-size:11px;color:var(--muted);white-space:nowrap;";
    $("deckTitle").after(el);
    SRV.badge = el;
    srvBadge("· serving "+SRV.label);
    if(m.problem){ SRV.problemShown=true; alert("deckserver: "+m.problem); }
    if(source===null) persistSoon();            // materialize the fresh deck
    setInterval(()=>{ SRV.q = SRV.q.then(srvPollNow); }, 2500);
  };

  /* ---- outbound: what differs from the last flush ---- */
  const srvDiff = ()=>{
    const puts=[], dels=[];
    for(const [p,b] of doc.assets) if(SRV.synced.assets.get(p)!==b) puts.push(p);
    for(const p of SRV.synced.assets.keys()) if(!doc.assets.has(p)) dels.push(p);
    const src = state.source!==SRV.synced.source || srvMdName()!==SRV.synced.name;
    return { puts, dels, src, any: puts.length>0 || dels.length>0 || src };
  };

  const CONFLICT = Symbol("conflict");
  // Every write states which version it believes it is replacing; the
  // server answers 412 if the disk moved on since. That closes the window
  // between polls in which a flush could clobber a fresh external edit —
  // on 412 we stop, and the next poll's reconciliation (prompt included)
  // sorts it out.
  const srvIfMtime = p =>
    SRV.mtimes.has(p) ? String(SRV.mtimes.get(p)) : "new";
  const srvWrite = async (p, blob)=>{
    const r = await srvApi("file/"+encPath(p), { method:"PUT", body:blob,
      headers:{ "X-Deckwright-If-Mtime": srvIfMtime(p) } });
    if(r.status===412) throw CONFLICT;
    if(!r.ok) throw new Error("PUT "+p+" -> "+r.status);
    SRV.mtimes.set(p, (await r.json()).mtime);
  };
  const srvRemove = async (p)=>{
    const r = await srvApi("file/"+encPath(p), { method:"DELETE",
      headers:{ "X-Deckwright-If-Mtime": srvIfMtime(p) } });
    if(r.status===412) throw CONFLICT;
    if(!r.ok) throw new Error("DELETE "+p+" -> "+r.status);
    SRV.mtimes.delete(p);
  };

  const srvFlushNow = async ()=>{
    const d = srvDiff();
    if(!d.any) return;
    srvBadge("· saving…");
    try{
      for(const p of d.puts){
        const b = doc.assets.get(p);
        await srvWrite(p, b);
        SRV.synced.assets.set(p, b);
      }
      for(const p of d.dels){
        await srvRemove(p);
        SRV.synced.assets.delete(p);
      }
      if(d.src){
        const name = srvMdName(), src = state.source;
        await srvWrite(name, new Blob([src], {type:"text/markdown"}));
        if(SRV.synced.name && SRV.synced.name!==name)    // rename: new first,
          await srvRemove(SRV.synced.name);              // then drop the old
        SRV.name = name;
        SRV.synced.name = name; SRV.synced.source = src;
      }
      SRV.offline = false;
      srvBadge("· serving "+SRV.label);
    }catch(err){
      // synced is only advanced past successful writes, so the next flush
      // (each poll retries) picks up exactly where this one failed
      if(err===CONFLICT){ srvBadge("· changed on disk — reconciling…"); return; }
      if(!SRV.offline){ SRV.offline=true; console.warn("deckserver:", err); }
      srvBadge("· server unreachable — NOT saved", true);
    }
  };
  const srvFlushSoon = ()=>{ SRV.q = SRV.q.then(srvFlushNow); };

  /* ---- inbound: adopt external changes into the live document ---- */
  const srvPull = async (changed, removed)=>{
    let themes=false, src=false;
    for(const p of removed){
      SRV.mtimes.delete(p);
      if(p===SRV.name){ SRV.synced.source=null; continue; } // app copy stays;
      dropAssetUrl(p);                                      // next flush recreates
      doc.assets.delete(p); SRV.synced.assets.delete(p);
      if(srvIsDocTheme(p)) themes=true;
    }
    for(const f of changed){
      const r = await srvApi("file/"+encPath(f.path));
      if(!r.ok) continue;                       // gone again; next poll settles it
      SRV.mtimes.set(f.path, f.mtime);
      if(f.path===SRV.name){
        const txt = await r.text();
        const keep = Math.min(ta.selectionStart, txt.length);
        state.source = txt; ta.value = txt;
        ta.setSelectionRange(keep, keep);
        SRV.synced.source = txt; SRV.synced.name = SRV.name;
        state.filename = SRV.name;
        src = true;
      }else{
        const b = await r.blob();
        dropAssetUrl(f.path);
        doc.assets.set(f.path, b); SRV.synced.assets.set(f.path, b);
        if(srvIsDocTheme(f.path)) themes=true;
      }
    }
    if(themes){
      for(const id of Object.keys(THEMES)) if(THEMES[id].path) delete THEMES[id];
      await registerDocThemes();
      if(!THEMES[state.themeId]) state.themeId="midnight";
      appliedThemeCss=null;
    }
    if(src) reparse();
    refresh(); renderAssets(); pushAssets();
  };

  const srvPollNow = async ()=>{
    let m;
    try{
      const r = await srvApi("manifest");
      if(!r.ok) throw new Error("manifest -> "+r.status);
      m = await r.json();
    }catch(e){
      if(!SRV.offline){ SRV.offline=true; console.warn("deckserver:", e); }
      srvBadge(srvDiff().any ? "· server unreachable — NOT saved"
                             : "· server unreachable", true);
      return;
    }
    if(m.problem && !SRV.problemShown){ SRV.problemShown=true;
      alert("deckserver: "+m.problem); }
    if(!m.problem) SRV.problemShown=false;
    if(!m.problem && m.manuscript && !srvDiff().src && !doc.assets.has(m.manuscript)){
      SRV.name = m.manuscript;                  // adopted an on-disk rename;
      state.filename = m.manuscript;            // srvMdName must follow suit
    }

    const disk = new Map(m.files.map(f=>[f.path, f]));
    const extChanged=[], extRemoved=[];
    for(const [p,f] of disk)
      if(SRV.mtimes.get(p)!==f.mtime) extChanged.push(f);
    for(const p of SRV.mtimes.keys())
      if(!disk.has(p)) extRemoved.push(p);

    if(extChanged.length || extRemoved.length){
      // conflicts are PER FILE: only a file dirty on both sides needs a call
      const d = srvDiff();
      const local = new Set([...d.puts, ...d.dels]);
      if(d.src){ local.add(srvMdName()); if(SRV.synced.name) local.add(SRV.synced.name); }
      const overlap = [...extChanged.map(f=>f.path), ...extRemoved]
        .filter(p=>local.has(p));
      let pullC = extChanged, pullR = extRemoved;
      if(overlap.length){
        const useDisk = confirm("Changed both on disk and in the app:\n  "
          + overlap.join("\n  ")
          + "\n\nOK — load the disk version (discards the app's edits to these)"
          + "\nCancel — keep the app version (overwrites the disk files)");
        if(!useDisk){
          pullC = extChanged.filter(f=>!local.has(f.path));
          pullR = extRemoved.filter(p=>!local.has(p));
          // the app wins: adopt the disk mtimes so this poll's finding isn't
          // re-raised; the flush below then overwrites the disk versions
          for(const p of overlap){
            const f=disk.get(p);
            if(f) SRV.mtimes.set(p, f.mtime); else SRV.mtimes.delete(p);
          }
        }
      }
      await srvPull(pullC, pullR);
    }
    await srvFlushNow();     // also the retry path while the server was away
  };

  // last gasp on page close: sendBeacon can only POST without headers, so
  // the token rides the query string and the server treats POST as PUT
  window.addEventListener("pagehide", ()=>{
    if(!SRV.on || !srvDiff().src) return;
    navigator.sendBeacon("/@deckwright/api/file/"+encPath(srvMdName())
      + "?token="+encodeURIComponent(SRV.token),
      new Blob([state.source], {type:"text/markdown"}));
  });

  // Start with a quick render so the UI isn't blank while restoring
  initWithSource(state.source);
  (async ()=>{
    if(await srvProbe()){ await srvBoot(); return; }
    try{
      const saved = await idbGet("current");
      if(saved && typeof saved.source === "string"){
        doc.assets.clear();
        for(const [p,b] of Object.entries(saved.assets || {})) doc.assets.set(p, b);
        await registerDocThemes();
        if(saved.themeId && THEMES[saved.themeId]) state.themeId = saved.themeId;
        appliedThemeCss = null;
        initWithSource(saved.source);
        state.filename = saved.filename || null;
        renderAssets();
        return;
      }
    }catch(e){ /* storage unavailable — fall through */ }
    try {
      const res = await fetch("deckwright_intro.md");
      if(res.ok){
        const text = await res.text();
        if(text.trim()){ initWithSource(text); state.filename = "deckwright_intro.md"; }
      }
    } catch(e){ /* network error or file:// — keep the fallback */ }
    renderAssets();   // pane is open by default — populate and size it on load
  })();

  ta.addEventListener("input", ()=>{
    state.source=ta.value;
    clearTimeout(parseTimer);
    parseTimer=setTimeout(()=>{
      reparse();
      state.index=indexAtCaret();
      refresh();
    }, 120);
    persistSoon();
  });
  ["keyup","click"].forEach(ev=> ta.addEventListener(ev, syncFromCaret));
  document.addEventListener("selectionchange", ()=>{ if(document.activeElement===ta) syncFromCaret(); });

  /* ---- presenter render ---- */
  const renderPresenter=()=>{
    applyTheme();
    const ss=slidesOf();
    const cur=ss[state.index], nxt=ss[state.index+1];
    $("pCurrent").innerHTML=""; $("pCurrent").appendChild(renderSlide(cur, 640));
    const pn=$("pNext"); pn.innerHTML="";
    if(nxt){ pn.appendChild(renderSlide(nxt, 300, {still:true})); }
    else { pn.innerHTML='<div style="width:300px;height:168px;display:flex;align-items:center;justify-content:center;color:var(--faint);font-family:var(--mono);font-size:12px;letter-spacing:1px">END OF DECK</div>'; }
    $("pNotes").textContent=cur.notes || "No notes on this slide.";
    $("pCounter").textContent=pad2(state.index+1)+" / "+pad2(ss.length);
    updateAudienceUI();
  }

  /* ---- navigation + sync ---- */
  const pushState=(dir, animate)=>{
    if(audienceWin && !audienceWin.closed){
      audienceWin.postMessage({ dw:1, type:"sync", source:state.source,
        index:state.index, themeCss:theme().css, dir:dir||1, animate:!!animate }, "*");
    }
  }
  // Assets travel as Blobs (structured clone) so the audience window renders
  // from its own copies — sent on the ready handshake and whenever they change.
  const pushAssets=()=>{
    if(!(audienceWin && !audienceWin.closed)) return;
    const files={}; doc.assets.forEach((b,p)=> files[p]=b);
    try{ audienceWin.postMessage({ dw:1, type:"assets", files }, "*"); }catch(e){}
  }
  const setIndex=(i)=>{
    const prev = state.index;
    const next = Math.max(0, Math.min(i, slidesOf().length-1));
    if(next === prev) return; // no-op nav (deck ends): don't replay transitions
    state.index = next;
    const dir = next > prev ? 1 : -1;
    renderMain(true, dir);
    pushState(dir, true); // no-op if the audience window isn't open
  }
  // Redraw whichever view the main window is showing.
  const renderMain=(animate, dir)=>{
    if(state.view === "presenter") renderPresenter();
    else renderEditor(animate, dir);
  };
  // Non-animated redraw + audience sync, for content refreshes (edits, theme…).
  const refresh=()=>{ renderMain(false); pushState(); };
  window.addEventListener("message", e=>{
    const m=e.data; if(!m||m.dw!==1) return;
    if(m.type==="ready"){ pushAssets(); pushState(); updateAudienceUI(); }
    else if(m.type==="nav"){
      // Audience-initiated nav: it has already rendered itself, so update our
      // state without echoing a sync back (the echo would cut its animation short).
      const prev = state.index;
      const next = Math.max(0, Math.min(m.index, slidesOf().length-1));
      if(next !== prev){
        state.index = next;
        renderMain(true, next > prev ? 1 : -1);
      }
    }
  });

  /* =========================================================================
   * WINDOW MODES — two fully independent toggles:
   *   viewBtn / viewBtn2      main window shows Edit or Presenter view
   *   audienceBtn / …Btn2     secondary window (always the Audience view)
   * Switching the main view never opens, closes or disturbs the audience
   * window, and hiding the audience never changes the main view.
   * ======================================================================= */
  const fmt=(ms)=>{ const s=Math.floor(ms/1000); return pad2(Math.floor(s/60))+":"+pad2(s%60); };

  const audienceOpen=()=> !!(audienceWin && !audienceWin.closed);
  const updateAudienceUI=()=>{
    const label = audienceOpen() ? "Hide audience" : "Show audience";
    $("audienceBtn").textContent = label;
    $("audienceBtn2").textContent = label;
    $("pStatus").innerHTML = audienceOpen()
      ? 'Audience: <b>live</b>' : 'Audience: <b style="color:var(--muted)">not connected</b>';
  };
  const showAudience=()=>{
    if(audienceOpen()){ try{ audienceWin.focus(); }catch(e){} return; }
    audienceWin=window.open(location.href, "deckwright-audience",
      "popup=yes,width=1280,height=720,left=120,top=120");
    if(watchTimer) clearInterval(watchTimer);
    // Watch for the user closing the audience window by hand.
    watchTimer=setInterval(()=>{
      if(!audienceOpen()){
        audienceWin=null; clearInterval(watchTimer); watchTimer=null;
      }
      updateAudienceUI();
    }, 1000);
    updateAudienceUI();
  };
  const hideAudience=()=>{
    try{ if(audienceOpen()) audienceWin.close(); }catch(e){}
    audienceWin=null;
    if(watchTimer){ clearInterval(watchTimer); watchTimer=null; }
    updateAudienceUI();
  };
  const toggleAudience=()=> audienceOpen() ? hideAudience() : showAudience();

  const setView=(v)=>{
    if(v === state.view) return;
    state.view = v;
    if(v === "presenter"){
      $("editor").style.display="none";
      $("presenter").classList.add("on");
      // Stopwatch persists across view toggles; click the timer to reset it.
      if(!startedAt) startedAt = Date.now();
      if(timerId) clearInterval(timerId);
      timerId=setInterval(()=>{ $("pTimer").textContent=fmt(Date.now()-startedAt); }, 250);
      $("pTimer").textContent=fmt(Date.now()-startedAt);
      renderPresenter();
    } else {
      $("presenter").classList.remove("on");
      $("editor").style.display="flex";
      if(timerId){ clearInterval(timerId); timerId=null; }
      renderEditor();
    }
  }

  /* ---- wiring ---- */
  const downloadBlob=(name,blob)=>{
    const u=URL.createObjectURL(blob), a=document.createElement("a");
    a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(u),1000);
  };
  const download=(name,text,mime)=> downloadBlob(name, new Blob([text],{type:mime}));

  /* ---- the document as a .ddz: manuscript + every asset, zipped ---- */
  const mdName=()=> state.filename && /\.(md|markdown)$/i.test(state.filename)
    ? state.filename
    : (state.deck.meta.title||"deck").replace(/[^\w.-]+/g,"_") + ".md";
  $("exportDdzBtn").addEventListener("click", async ()=>{
    const entries=[{ name: mdName(), data: new TextEncoder().encode(state.source) }];
    for(const [p,blob] of doc.assets)
      entries.push({ name:p, data:new Uint8Array(await blob.arrayBuffer()) });
    const base = mdName().replace(/\.(md|markdown)$/i,"");
    downloadBlob(base + ".ddz", new Blob([zipWrite(entries)], {type:"application/zip"}));
  });
  $("exportBtn").addEventListener("click", ()=>{
    const safe = state.filename || (state.deck.meta.title||"deck").replace(/[^\w.-]+/g,"_") + ".md";
    download(safe, state.source, "text/markdown");
  });
  $("exportAsBtn").addEventListener("click", ()=>{
    const suggested = state.filename || (state.deck.meta.title||"deck").replace(/[^\w.-]+/g,"_") + ".md";
    const name = prompt("Save as:", suggested);
    if(!name) return;
    state.filename = name.endsWith(".md") ? name : name + ".md";
    download(state.filename, state.source, "text/markdown");
  });
  $("importBtn").addEventListener("click", ()=> $("importInput").click());
  /* ---- export: fully static HTML of just what the audience sees ----
     Run the engine once, ship only its output: every slide is drawn through
     renderSlide() right here at reference size, and the markup is serialized
     into a script-free page. The slide CSS is sliced verbatim from this
     file's own stylesheet between the SLIDE-CSS markers, and the font vars
     are read from the live :root — one definition, two consumers. Notes are
     never included because renderSlide() never renders them. */
  $("exportHtmlBtn").addEventListener("click", ()=>{
    const styleText = document.querySelector("style").textContent;
    const m = styleText.match(/\/\*\s*SLIDE-CSS-BEGIN\s*\*\/([\s\S]*?)\/\*\s*SLIDE-CSS-END\s*\*\//);
    // The slice already carries its own "@layer deck-base{ … }" wrapper; the
    // theme goes into deck-theme after it, exactly like the live app — except
    // any theme @import must be hoisted to the very top of the stylesheet.
    const th = splitThemeImports(theme().css);
    const slideCss = (m ? m[1] : "")
      + "\n@layer deck-theme{\n" + th.body + "\n}";
    const fontVars = ["--sans","--mono"].map(v => {
      const fm = styleText.match(new RegExp(v.replace(/-/g,"\\-") + "\\s*:\\s*([^;]+);"));
      return fm ? v + ":" + fm[1].trim() + ";" : "";
    }).join(" ");
    // Render with asset resolution bypassed: the export keeps relative
    // references verbatim, expecting to live in the document directory
    // (blob: URLs would be dead the moment the file is opened elsewhere).
    const slidesHtml = withRawSrc(()=>
      slidesOf().map(s => renderSlide(s, REF_W).outerHTML).join("\n"));
    const escd = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
    const page = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>${escd(state.deck.meta.title || "Deck")}</title>
<style>
${th.imports}
/* Generated by Deckwright — static export. No scripts, just the slides. */
@layer deck-base, deck-theme;
:root{ ${fontVars} color-scheme:dark; }
html,body{ margin:0; }
body{ background:#0c0f16; font-family:var(--sans);
  display:flex; flex-direction:column; align-items:center;
  gap:28px; padding:28px 16px; }
/* Pure-CSS fit-to-window. Browsers without length division in calc()
   ignore this and show slides at native ${REF_W}px (scroll to pan). */
.slide{ zoom:min(1, calc((100vw - 32px) / ${REF_W}px));
  flex:0 0 auto; border-radius:6px; box-shadow:0 18px 50px rgba(0,0,0,.5); }
@media print{
  body{ background:#fff; padding:0; gap:0; }
  .slide{ zoom:1; border-radius:0; box-shadow:none; break-after:page; }
}
${slideCss}
</style>
</head>
<body>
${slidesHtml}
</body>
</html>
`;
    const base = (state.filename || state.deck.meta.title || "deck")
      .replace(/\.md$/i,"").replace(/[^\w.-]+/g,"_");
    download(base + ".html", page, "text/html");
  });
  /* Loading OPENS a document. A bare .md is the one-file document; a .ddz is
     the full tree. Either way the current assets are replaced — that is what
     "open" means — so discarding a non-empty asset set asks first. */
  const replaceAssets=(next)=>{               // next: Map<path, Blob>
    // unregister the old document's themes; the new document's own .css
    // files get (re)registered from its assets afterwards
    for(const id of Object.keys(THEMES)){
      if(THEMES[id].path) delete THEMES[id];
    }
    for(const p of assetUrls.keys()) dropAssetUrl(p);
    doc.assets.clear();
    for(const [p,b] of next) doc.assets.set(p,b);
    if(!THEMES[state.themeId]) state.themeId = "midnight";
    appliedThemeCss = null;                   // force re-install (urls changed)
  };
  const afterDocLoaded=(source, filename)=>{
    state.source = source;
    state.filename = filename;
    ta.value = state.source;
    reparse(); state.index = 0;
    ta.setSelectionRange(0,0);
    assetsAutoSized=false;                 // re-fit the open pane to this document
    refresh(); renderAssets(); pushAssets(); persistSoon();
  };
  const openMd=(f)=>{
    const r=new FileReader();
    r.onload=()=>{
      replaceAssets(new Map());
      afterDocLoaded(String(r.result), f.name);
    };
    r.readAsText(f);
  };
  const openDdz=async (f)=>{
    let files;
    try{ files = await zipRead(await f.arrayBuffer()); }
    catch(err){ alert("Could not read "+f.name+": "+err.message); return; }
    const roots = [...files.keys()].filter(p => !p.includes("/") && /\.md$/i.test(p));
    if(roots.length !== 1){
      alert("A .ddz must contain exactly one .md at its root — this one has "
        + (roots.length ? roots.length+" ("+roots.join(", ")+")" : "none") + ".");
      return;
    }
    const mdPath = roots[0];
    const source = new TextDecoder("utf-8").decode(files.get(mdPath));
    const next = new Map();
    for(const [p,bytes] of files){
      if(p === mdPath) continue;
      next.set(p, new Blob([bytes], {type:mimeOf(p)}));
    }
    replaceAssets(next);
    const problems = await registerDocThemes();
    if(problems.length) alert("Some theme files were skipped:\n"+problems.join("\n"));
    afterDocLoaded(source, mdPath);
  };

  /* ---- INGEST — the one router every incoming file passes through --------
     Two verbs, chosen by file type, so buttons and drag-drop share one path:

       LOAD  (.md / .markdown / .ddz)  replace the whole document.
                                       .ddz vs bare .md is an implementation
                                       detail hidden inside loadDocument().
       ADD   (anything else)           merge into the current document. A root
                                       .css registers as a theme but is NOT
                                       made active (addAssetFiles handles that).

     A batch containing a document file LOADS it: a load replaces everything,
     so assets co-dropped from the same batch belong to a different document
     and are ignored. Otherwise every file is added. */
  const isDocFile = (name)=> /\.(md|markdown|ddz)$/i.test(name);

  const loadDocument = async (f)=>{
    if(doc.assets.size &&
       !confirm(`Open ${f.name}? The current document (and its ${doc.assets.size} asset file${doc.assets.size>1?"s":""}) will be replaced.`)) return;
    if(/\.ddz$/i.test(f.name)) await openDdz(f); else openMd(f);
  };

  const ingest = async (fileList, { fromDrop=false } = {})=>{
    const files=[...fileList]; if(!files.length) return;
    const docFile = files.find(f=>isDocFile(f.name));
    if(docFile){ await loadDocument(docFile); return; }
    addAssetFiles(files);
    if(fromDrop) files.filter(f=>isImagePath(f.name)).forEach(f=>insertImageDirective(f.name));
  };

  $("importInput").addEventListener("change", e=>{
    ingest(e.target.files); e.target.value="";
  });

  $("newBtn").addEventListener("click", ()=>{
    if(state.source !== NEW_DECK || doc.assets.size){
      const extra = doc.assets.size ? " (including this document's assets)" : "";
      if(!confirm("Start a new deck? Unsaved changes"+extra+" will be lost.")) return;
    }
    replaceAssets(new Map());
    afterDocLoaded(NEW_DECK, "new_deck.md");
  });
  $("viewBtn").addEventListener("click", ()=>setView("presenter"));
  $("viewBtn2").addEventListener("click", ()=>setView("edit"));
  $("audienceBtn").addEventListener("click", toggleAudience);
  $("audienceBtn2").addEventListener("click", toggleAudience);
  $("pTimer").title = "Click to reset";
  $("pTimer").style.cursor = "pointer";
  $("pTimer").addEventListener("click", ()=>{ startedAt=Date.now(); $("pTimer").textContent=fmt(0); });
  $("pPrev").addEventListener("click", ()=>setIndex(state.index-1));
  $("pNext2").addEventListener("click", ()=>setIndex(state.index+1));
  /* The theme selection is DOCUMENT state: the front matter `theme:` line is
     its one home. Cycling the button therefore EDITS the manuscript — it
     rewrites the line (the last one, which is the one the parser honors),
     adds it to existing front matter, or wraps a bare document in a new
     front matter block. Everything downstream (state.themeId via reparse,
     persistence, .ddz, audience sync) follows from the edit like from any
     other keystroke. */
  const setSourceTheme=(id)=>{
    const src = ta.value;
    const lines = src.split("\n");
    let out;
    if(lines[0] !== undefined && lines[0].trim() === "---"){
      let j=1, themeLine=-1;
      while(j<lines.length && lines[j].trim()!=="---"){
        const m=lines[j].match(/^([\w]+)\s*:/);
        if(m && m[1].toLowerCase()==="theme") themeLine=j;
        j++;
      }
      if(themeLine>=0) lines[themeLine]="theme: "+id;
      else lines.splice(Math.min(j, lines.length), 0, "theme: "+id);
      out = lines.join("\n");
    }else{
      out = "---\ntheme: "+id+"\n---\n\n"+src;
    }
    // keep the caret where the user left it, shifted past the edit
    let p=0; const n=Math.min(src.length,out.length);
    while(p<n && src[p]===out[p]) p++;
    const d=out.length-src.length;
    const adj=x=> x<=p ? x : Math.max(p, x+d);
    const s0=ta.selectionStart, e0=ta.selectionEnd;
    ta.value = out;
    ta.setSelectionRange(adj(s0), adj(e0));
    state.source = out;
  };
  $("themeBtn").addEventListener("click", ()=>{
    const ids=Object.keys(THEMES);
    setSourceTheme(ids[(ids.indexOf(state.themeId)+1)%ids.length]);
    reparse();             // front matter now names the theme; reparse adopts it
    refresh(); persistSoon();
  });
  /* Loaded themes become part of the DOCUMENT: the .css file joins the
     assets at the root, so it persists, saves into the .ddz, and reloads
     with the document. Same format as the built-ins, same registry — the
     Theme button cycles them, decks reference them by id in front matter,
     and the audience gets the CSS via sync. */
  /* A theme is added like any other asset: drop or "+ Add files…" a root .css
     and addAssetFiles registers it (without switching to it). The theme button
     is the switcher; there is no separate theme-load path any more. */
  $("notesBtn").addEventListener("click", ()=>{
    const p=$("notesPanel"), hidden=p.style.display==="none";
    p.style.display=hidden?"block":"none";
    $("notesBtn").textContent=hidden?"Hide notes":"Show notes";
  });

  /* =========================================================================
   * ASSETS PANEL — the document's files: list, add, delete, insert.
   * Dropping files anywhere on the manuscript adds them; dropped images also
   * get an image directive inserted at the caret, which is the common move.
   * ======================================================================= */
  const fmtSize = n => n<1024 ? n+" B"
    : n<1048576 ? (n/1024).toFixed(1)+" KB" : (n/1048576).toFixed(1)+" MB";

  let assetsAutoSized=false;
  // Fit the assets pane to its content, clamped to the same bounds the drag
  // handle honors. Measured by letting the panel take its natural height —
  // CSS min-height/max-height already bound it — then pinning that in px.
  const autosizeAssets=()=>{
    const panel=$("assetsPanel");
    if(!panel || panel.classList.contains("collapsed")) return;
    const editpane=document.querySelector(".editpane");
    panel.style.height="auto";
    const natural=Math.ceil(panel.getBoundingClientRect().height);
    const maxH=Math.max(80, editpane.getBoundingClientRect().height - 160);
    panel.style.height=Math.max(80, Math.min(natural, maxH))+"px";
  };
  // The pane is open by default; size it to content the first time it shows.
  // Afterwards (and after any manual drag) its height is left untouched.
  const firstOpenAutosize=()=>{
    if(assetsAutoSized) return;
    const panel=$("assetsPanel");
    if(!panel || panel.classList.contains("collapsed")) return;
    assetsAutoSized=true;
    autosizeAssets();
  };

  const renderAssets=()=>{
    $("assetsStatus").textContent = "Assets" + (doc.assets.size ? " ("+doc.assets.size+")" : "");
    const list=$("assetsList"); list.innerHTML="";
    if(!doc.assets.size){
      const d=document.createElement("div");
      d.className="a-empty";
      d.textContent="No files yet — add them with Load, or drop them on the manuscript.";
      list.appendChild(d);
      firstOpenAutosize();
      return;
    }
    [...doc.assets.keys()].sort().forEach(p=>{
      const row=document.createElement("div"); row.className="a-row";
      const isTheme = Object.values(THEMES).some(t=>t.path===p);
      const name=document.createElement("span");
      name.className="a-name"+(isTheme?" a-theme":"");
      name.textContent=p; name.title=p + (isTheme?" — a theme of this document":"");
      const size=document.createElement("span"); size.className="a-size";
      size.textContent=fmtSize(doc.assets.get(p).size);
      row.append(name, size);
      if(isImagePath(p)){
        const ins=document.createElement("button"); ins.className="a-act";
        ins.textContent="↳"; ins.title="Insert an image directive at the caret";
        ins.addEventListener("click", ()=>insertImageDirective(p));
        row.appendChild(ins);
      }
      const del=document.createElement("button"); del.className="a-act";
      del.textContent="×"; del.title="Remove from the document";
      del.addEventListener("click", ()=>{
        if(!confirm(`Remove ${p} from the document?`)) return;
        deleteAsset(p);
      });
      row.appendChild(del);
      list.appendChild(row);
    });
    firstOpenAutosize();
  };

  // one funnel for every asset mutation: re-render (references may resolve
  // differently now), re-theme, sync the audience, persist
  const assetsChanged=()=>{
    refresh(); renderAssets(); pushAssets(); persistSoon();
  };

  const addAssetFiles=(fileList)=>{
    const files=[...fileList]; if(!files.length) return;
    (async ()=>{
      for(const f of files){
        const p = f.name;                       // added files land at the root
        dropAssetUrl(p);
        doc.assets.set(p, f);
        // a root .css with a @theme header is a document theme
        if(/\.css$/i.test(p)){
          try{
            const t=registerTheme(await f.text());
            t.path=p; appliedThemeCss=null;
          }catch(e){ /* plain css asset, fine */ }
        }
      }
      assetsChanged();
    })();
  };

  const deleteAsset=(p)=>{
    dropAssetUrl(p);
    doc.assets.delete(p);
    for(const id of Object.keys(THEMES)){       // was it a document theme?
      if(THEMES[id].path===p) delete THEMES[id];
    }
    if(!THEMES[state.themeId]){ state.themeId="midnight"; appliedThemeCss=null; }
    assetsChanged();
  };

  const insertImageDirective=(p)=>{
    const ref = /[\s"]/.test(p) ? '"'+p+'"' : p;
    const ins = `<!-- image: ${ref} -->\n`;
    const pos = ta.selectionStart ?? state.source.length;
    // sit on its own line: pad to a line start if the caret isn't at one
    const atLineStart = pos===0 || state.source[pos-1]==="\n";
    const text = (atLineStart?"":"\n") + ins;
    state.source = state.source.slice(0,pos) + text + state.source.slice(pos);
    ta.value = state.source;
    const np = pos + text.length;
    ta.focus(); ta.setSelectionRange(np,np);
    reparse(); state.index=indexAtCaret();
    refresh(); highlightSrc(); persistSoon();
  };

  // drag the handle at the top of the panel to change its height; double-click
  // it to collapse / restore (matching the main column dividers)
  (()=>{
    const panel=$("assetsPanel"), handle=$("assetsResize");
    if(!panel || !handle) return;
    const editpane=document.querySelector(".editpane");
    let startY=null, startH=0, savedAssetsH="";
    const maxH=()=> Math.max(80, editpane.getBoundingClientRect().height - 160);
    const onDown=(y)=>{
      if(panel.classList.contains("collapsed")) return;  // double-click to restore
      startY=y; startH=panel.getBoundingClientRect().height;
      handle.classList.add("dragging");
      document.body.classList.add("row-resizing");
    };
    const onMove=(y)=>{
      if(startY==null) return;
      const newH=Math.max(80, Math.min(startH + (startY - y), maxH()));
      panel.style.height=newH+"px";
    };
    const onUp=()=>{
      startY=null;
      handle.classList.remove("dragging");
      document.body.classList.remove("row-resizing");
    };
    const mm=e=>onMove(e.clientY);
    const mu=()=>{ onUp(); document.removeEventListener("mousemove",mm); document.removeEventListener("mouseup",mu); };
    handle.addEventListener("mousedown", e=>{
      e.preventDefault(); onDown(e.clientY);
      document.addEventListener("mousemove",mm); document.addEventListener("mouseup",mu);
    });
    handle.addEventListener("touchstart", e=>{
      e.preventDefault(); onDown(e.touches[0].clientY);
      const tm=ev=>{ ev.preventDefault(); onMove(ev.touches[0].clientY); };
      const tu=()=>{ onUp(); handle.removeEventListener("touchmove",tm); handle.removeEventListener("touchend",tu); };
      handle.addEventListener("touchmove",tm,{passive:false});
      handle.addEventListener("touchend",tu);
    },{passive:false});
    // double-click to collapse / restore, remembering the expanded height
    handle.addEventListener("dblclick", ()=>{
      if(panel.classList.contains("collapsed")){
        panel.classList.remove("collapsed");
        if(savedAssetsH) panel.style.height=savedAssetsH;
      } else {
        savedAssetsH = panel.style.height || getComputedStyle(panel).height;
        panel.classList.add("collapsed");
        panel.style.height="";   // let the collapsed rule drive the height
      }
    });
  })();

  // Assets enter through the single Load control or by dropping on the
  // manuscript — both routed by ingest(); there is no separate asset picker.

  // drag-drop on the manuscript: a dropped .md/.ddz loads (replaces) the
  // document; anything else is added, and dropped images insert in place.
  ["dragenter","dragover"].forEach(ev=> ta.addEventListener(ev, e=>{
    if(e.dataTransfer && [...e.dataTransfer.types].includes("Files")){
      e.preventDefault(); ta.classList.add("droptarget");
    }
  }));
  ["dragleave","dragend"].forEach(ev=> ta.addEventListener(ev, ()=>
    ta.classList.remove("droptarget")));
  ta.addEventListener("drop", e=>{
    if(!(e.dataTransfer && e.dataTransfer.files.length)) return;
    e.preventDefault(); ta.classList.remove("droptarget");
    ingest(e.dataTransfer.files, { fromDrop:true });
  });

  window.addEventListener("keydown", e=>{
    if(e.key==="Escape" && state.view==="presenter"){ setView("edit"); return; }
    const tag=(e.target.tagName||"").toLowerCase();
    const typing = tag==="input" || tag==="textarea" || tag==="select" || e.target.isContentEditable;
    // While editing the manuscript, let arrows move the caret (caret-sync picks the slide).
    if(typing && state.view==="edit") return;
    if(["ArrowRight"," ","PageDown"].includes(e.key)){ e.preventDefault(); setIndex(state.index+1); }
    else if(["ArrowLeft","PageUp"].includes(e.key)){ e.preventDefault(); setIndex(state.index-1); }
  });
  window.addEventListener("resize", ()=>{ if(state.view==="edit") renderEditor(); });
  window.addEventListener("beforeunload", ()=>{ try{ audienceWin && audienceWin.close(); }catch(e){} });

  /* ---- draggable pane dividers ---- */
  (()=>{
    const rail=$("rail"), main=document.querySelector(".main"), editpane=document.querySelector(".editpane");
    const dL=$("dividerLeft"), dR=$("dividerRight");
    const MIN_RAIL=120, MAX_RAIL=360, MIN_EDIT=240, MIN_MAIN=300;
    let savedRailW=null, savedEditW=null;

    const startDrag=(divider, side)=>{
      let startX, startW;
      const pane = side==="left" ? rail : editpane;

      // if neighbor is collapsed, don't drag — double-click restores instead
      if(pane.classList.contains("collapsed")) return;

      const onDown=(ex)=>{
        startX = ex; startW = pane.getBoundingClientRect().width;
        divider.classList.add("dragging");
        document.body.classList.add("col-resizing");
      };
      const onMove=(ex)=>{
        if(startX==null) return;
        const bodyW = document.querySelector(".body").getBoundingClientRect().width;
        const otherFixed = (side==="left" ? editpane : rail).getBoundingClientRect().width;
        const dividers = 12; // two 6px dividers
        const maxForMain = bodyW - otherFixed - dividers - MIN_MAIN;
        let delta = side==="left" ? (ex - startX) : (startX - ex);
        let newW = Math.round(startW + delta);
        if(side==="left"){
          newW = Math.max(MIN_RAIL, Math.min(newW, MAX_RAIL, maxForMain));
        } else {
          newW = Math.max(MIN_EDIT, Math.min(newW, maxForMain));
        }
        pane.style.width = newW + "px";
        // live-update preview since stage size changed
        renderPreview();
      };
      const onUp=()=>{
        startX=null;
        divider.classList.remove("dragging");
        document.body.classList.remove("col-resizing");
        renderEditor(); // full re-render with new rail thumbnails
      };

      const md=e=>{ e.preventDefault(); onDown(e.clientX); };
      const mm=e=>{ onMove(e.clientX); };
      const mu=()=>{ onUp(); document.removeEventListener("mousemove",mm); document.removeEventListener("mouseup",mu); };
      divider.addEventListener("mousedown", e=>{
        if(pane.classList.contains("collapsed")) return;
        md(e); document.addEventListener("mousemove",mm); document.addEventListener("mouseup",mu);
      });
      // touch
      divider.addEventListener("touchstart", e=>{
        if(pane.classList.contains("collapsed")) return;
        e.preventDefault(); onDown(e.touches[0].clientX);
        const tm=ev=>{ onMove(ev.touches[0].clientX); };
        const tu=()=>{ onUp(); divider.removeEventListener("touchmove",tm); divider.removeEventListener("touchend",tu); };
        divider.addEventListener("touchmove",tm,{passive:false});
        divider.addEventListener("touchend",tu);
      },{passive:false});
    };

    startDrag(dL, "left");
    startDrag(dR, "right");

    // double-click to collapse / restore
    dL.addEventListener("dblclick", ()=>{
      if(rail.classList.contains("collapsed")){
        rail.classList.remove("collapsed");
        if(savedRailW) rail.style.width = savedRailW;
        dL.classList.remove("neighbor-collapsed");
      } else {
        savedRailW = rail.style.width || getComputedStyle(rail).width;
        rail.classList.add("collapsed");
        dL.classList.add("neighbor-collapsed");
      }
      renderEditor();
    });
    dR.addEventListener("dblclick", ()=>{
      if(editpane.classList.contains("collapsed")){
        editpane.classList.remove("collapsed");
        if(savedEditW) editpane.style.width = savedEditW;
        dR.classList.remove("neighbor-collapsed");
      } else {
        savedEditW = editpane.style.width || getComputedStyle(editpane).width;
        editpane.classList.add("collapsed");
        dR.classList.add("neighbor-collapsed");
      }
      renderEditor();
    });
  })();
}
</script>
</body>
</html>
